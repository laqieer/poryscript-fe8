name: Go

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # CI: build, vet and test on every push/PR. This must NOT depend on the FE8
  # decomp (FE8_DIR) — check.sh / `make check` are local-only and are never run
  # here, because they require a read-only fireemblem8u checkout + agbcc/cpp.
  # ---------------------------------------------------------------------------
  ci:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  # ---------------------------------------------------------------------------
  # Release: on a v* tag, cross-compile the tool for every supported platform
  # and attach a ready-to-use archive (binary + FE8 config + font config +
  # docs) to a GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    name: Release ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          bin=poryscript-fe8
          if [ "$GOOS" = "windows" ]; then
            bin="${bin}.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "$bin" .

      - name: Bundle release archive
        id: bundle
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          stage="poryscript-fe8-${GOOS}-${GOARCH}"
          mkdir "$stage"
          if [ "$GOOS" = "windows" ]; then
            cp poryscript-fe8.exe "$stage/"
          else
            cp poryscript-fe8 "$stage/"
          fi
          cp command_config.fe8.json "$stage/"
          cp font_config.json "$stage/"
          cp README.md "$stage/"
          cp CHANGELOG.md "$stage/"
          cp LICENSE.md "$stage/"
          if [ "$GOOS" = "windows" ]; then
            archive="${stage}.zip"
            zip -r "$archive" "$stage"
          else
            archive="${stage}.tar.gz"
            tar -czf "$archive" "$stage"
          fi
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.bundle.outputs.archive }}
